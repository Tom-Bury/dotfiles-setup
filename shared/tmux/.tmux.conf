set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Catppuccin Mocha palette
set -ogq @thm_bg "#1e1e2e"
set -ogq @thm_fg "#cdd6f4"
set -ogq @thm_rosewater "#f5e0dc"
set -ogq @thm_flamingo "#f2cdcd"
set -ogq @thm_pink "#f5c2e7"
set -ogq @thm_mauve "#cba6f7"
set -ogq @thm_red "#f38ba8"
set -ogq @thm_maroon "#eba0ac"
set -ogq @thm_peach "#fab387"
set -ogq @thm_yellow "#f9e2af"
set -ogq @thm_green "#a6e3a1"
set -ogq @thm_teal "#94e2d5"
set -ogq @thm_sky "#89dceb"
set -ogq @thm_sapphire "#74c7ec"
set -ogq @thm_blue "#89b4fa"
set -ogq @thm_lavender "#b4befe"
set -ogq @thm_subtext_1 "#a6adc8"
set -ogq @thm_subtext_0 "#bac2de"
set -ogq @thm_overlay_2 "#9399b2"
set -ogq @thm_overlay_1 "#7f849c"
set -ogq @thm_overlay_0 "#6c7086"
set -ogq @thm_surface_2 "#585b70"
set -ogq @thm_surface_1 "#45475a"
set -ogq @thm_surface_0 "#313244"
set -ogq @thm_mantle "#181825"
set -ogq @thm_crust "#11111b"

# Use CTRL + A as entrypoint for command
unbind C-b
# But pressing twice will still go through
set -g prefix C-a 

# Match window numbers to the order of the keys on a keyboard.
set -g base-index 1
setw -g pane-base-index 1
setw -g renumber-windows on

# split panes using | and -, preserving the current pane path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# enable mouse mode
set -g mouse on

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf; display "Config reloaded!"

set-option -g status-position top
set-option -g status-justify centre
set-option -g status-style 'fg=#cdd6f4,bg=terminal'
set-option -g status-bg terminal
set-option -g status-left '#[fg=#11111b,bg=#89b4fa,bold] #S #[default] '
set-option -g status-left-length 24
set-option -g status-right ''
set-option -g status-right-length 0
set-option -g status-interval 60

set-option -g message-style 'fg=#1e1e2e,bg=#f9e2af,bold'
set-option -g mode-style 'fg=#11111b,bg=#cba6f7,bold'
set-option -g clock-mode-colour '#89b4fa'

# Make active pane obvious while preserving terminal transparency
# Keep pane text untouched; only borders/status get themed.
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'
set -g pane-active-border-style 'fg=#89b4fa,bg=default,bold'
set -g pane-border-style 'fg=#45475a,bg=default'
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format ''

set-window-option -g window-status-format '#[fg=#7f849c,bg=default] #I:#W#F #[default]'
set-window-option -g window-status-current-format '#[fg=#11111b,bg=#cba6f7,bold] #I:#W#F #[default]'

# Session switcher
bind s choose-tree -sZ

# Immediately kill panes on CTRL A + X
# without confirmation prompt
bind x kill-pane

# Navigate between panes with CTRL + A -> hjkl
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes using CTRL + A -> CTRL + hjkl
bind -r C-h resize-pane -L 10
bind -r C-j resize-pane -D 10
bind -r C-k resize-pane -U 10
bind -r C-l resize-pane -R 10

